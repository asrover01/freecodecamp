<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightbox Viewer</title>
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>
    <h1>Lightbox Viewer</h1>
    <p>Click on an image to view it in a lightbox.</p>
    <div class="gallery">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/stonehenge-thumbnail.jpg" alt="picture of stonehenge" class="gallery-item">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/storm-thumbnail.jpg" alt="abandoned moutain top structures" class="gallery-item">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/trees-thumbnail.jpg" alt="forest cottage with sheep" class="gallery-item">
    </div>
    <div class="lightbox">
      <button id="close-btn">&times;</button>
      <img src="" id="lightbox-image">
    </div>


    <script src="script.js"></script>
  </body>

</html>
